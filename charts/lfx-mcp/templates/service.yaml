---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lfx-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-mcp.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: web
      port: {{ .Values.service.port }}
      targetPort: web
  selector:
    {{- include "lfx-mcp.selectorLabels" . | nindent 4 }}
