# SPDX-License-Identifier: MIT
#
# The gate: the only workflow that reaches a merge verdict. No model runs here. It
# re-derives from the PR's CURRENT head and, when agentic-review/clean is success,
# the needs-human label is absent, and every review thread carries at least one
# reply, records an "approve" verdict.
#
# The thread condition is the tidiness rule: non-blocking findings (nits) do not
# hold the clean status, but the approving review waits until every thread — AI or
# human — has at least one reply beyond the finding itself, so nothing is ever
# dismissed without a recorded reason. A fixed finding satisfies it automatically
# (the reconcile replies "fixed in <sha>" when it clears a thread); an unaddressed
# nit needs the engineer's answer. Thread RESOLUTION is deliberately NOT required:
# it is optional human hygiene. No automation token available to this pipeline can
# resolve threads — the resolveReviewThread/unresolveReviewThread mutations return
# FORBIDDEN for both the fine-grained PAT ("Resource not accessible by personal
# access token") and GITHUB_TOKEN with pull-requests:write, with or without
# contents:read ("Resource not accessible by integration"; probed empirically) —
# only classic-scoped user tokens can run them.
#
# It triggers on the signals the deterministic apply layer produces with a PAT
# (the agentic-review/clean status and the needs-human label). PAT-generated events
# DO start workflows, unlike GITHUB_TOKEN ones, so triggering on status / labeled
# fires reliably. A developer's thread reply is a gate input but its event
# (pull_request_review_comment) is not among our triggers, so a scheduled sweep
# job dispatches this workflow per open PR (workflow_dispatch is one of the two
# events GITHUB_TOKEN is allowed to trigger, and it appends nothing — re-stamping
# statuses instead would hit GitHub's 1,000-statuses-per-SHA/context cap within
# days). That is what releases the approval after the engineer answers the last
# thread. The gate re-derives from the current head, so a PR that advanced past
# the reviewed SHA fails closed.
#
# The gate is always live: it posts and revokes real approvals. The fail-soft PAT
# fetch is the only thing between it and acting — an unwired repo skips cleanly.
#
# The gate posts an approving review as the lfx-reviewer machine account (a non-author
# with write + a Copilot seat, listed in CODEOWNERS), so the approval counts under
# code-owner branch protection. On a withheld verdict it dismisses any stale
# lfx-reviewer approval, so a PR that regressed past a clean state loses its sign-off.
# It approves or dismisses only; it never merges. A human review is still expected.
#
# The needs-human label is the HUMAN override surface, by design: the escalation
# judge can only raise the flag (the label is sticky and add-only), and an
# AUTHORIZED human removing the label is the sanctioned way to say "I have
# looked, this may proceed". GitHub has no per-label permissions, so authority
# is enforced HERE, not on the label: only unlabels by the allowlisted logins in
# the Evaluate step count, an unauthorized removal leaves the gate withheld (and
# escalation re-labels on the next push), and the allowlist lives in this
# default-branch workflow file so changing it takes a reviewed PR. While the
# label is set, escalation skips its per-head runs (the sticky label cannot be
# added twice) and records the skip as a per-head marker status; the override
# timing rule covers the verdict gap — an authorized unlabel counts for the
# current head only if that head carries the skip marker (a missing verdict
# alone also means "still in flight", which must never be overridden) and the
# unlabel postdates the head's round start, so a sign-off never extends to code
# pushed after the human looked. The clean status and tidiness must still be
# green either way.
---
name: Agentic Gate

# pull_request_target, not pull_request, for the label events: this job holds
# id-token: write and fetches the lfx-reviewer PAT, so its definition must come
# from the DEFAULT branch — a pull_request trigger would run the PR's modified
# copy of this file with those privileges. Safe here because the job never
# checks out or executes PR code. (status events always run the default-branch
# definition already.)
"on":
  status: {}
  pull_request_target:
    types: [labeled, unlabeled]
  # Trusted needs-human verdict comments also gate: a "no" verdict produces no
  # label and no status write, so without this trigger a PR whose clean status
  # landed before the verdict would stay unapproved until some unrelated event.
  issue_comment:
    types: [created]
  # Thread tidiness is a gate input, but the events that change it (developer
  # replies) are not among our triggers, so the sweep job below re-fires the
  # evaluation on a timer via per-PR workflow_dispatch (dispatch runs use the
  # default-branch definition, so this stays safe for a PAT-holding job).
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      pr:
        description: Open PR number to evaluate
        required: true
        type: string

# Status events carry no PR number, but the description apply stamps does
# (pr=#N) — folding it into the key keeps evaluations for different PRs on the
# SAME head SHA in different groups, so events for several PRs cannot cancel
# all but the last one. Schedule events collapse to a constant key, which just
# serializes overlapping sweeps.
concurrency:
  group: gate-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr || format('{0}-{1}', github.event.sha, github.event.description) }}
  cancel-in-progress: true

# Least privilege for GITHUB_TOKEN: the gate job only READS with it (PR, labels,
# commit status). The approve/dismiss steps authenticate with the lfx-reviewer PAT
# fetched from AWS Secrets Manager via OIDC (id-token), whose power comes from the
# PAT, not from these permissions. The sweep job overrides this block with its own
# narrower set (reads + actions:write for the self-dispatch, no id-token).
permissions:
  contents: read
  pull-requests: read
  issues: read      # escalation verdict comments + needs-human label timeline
  statuses: read
  id-token: write

jobs:
  gate:
    # Only react to the two gating signals: our own agentic-review/clean status (a
    # status event fires for every context, CI statuses too) and the needs-human
    # label (label events fire for every label, so routine label churn is ignored).
    if: >-
      github.event_name != 'schedule' &&
      (github.event_name != 'status' ||
       github.event.context == 'agentic-review/clean') &&
      (github.event_name != 'pull_request_target' ||
       github.event.label.name == 'needs-human') &&
      (github.event_name != 'issue_comment' ||
       (github.event.issue.pull_request != null &&
        github.event.comment.user.login == 'lfx-reviewer' &&
        contains(github.event.comment.body, 'agentic:needs-human')))
    runs-on: ubuntu-latest
    env:
      # Humans whose needs-human unlabel this gate honors — the single source
      # for both the Evaluate step and the pre-approval recheck. Space-
      # separated logins; extending it takes a reviewed PR to this file.
      NEEDS_HUMAN_UNLABELERS: "josep-reyero niravpatel27 emsearcy"
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_PR: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr }}
          EVENT_SHA: ${{ github.event.sha }}
          EVENT_DESC: ${{ github.event.description }}
        run: |
          set -euo pipefail
          PR=""
          if [ -n "$EVENT_PR" ]; then
            PR="$EVENT_PR"
          elif [ -n "$EVENT_SHA" ]; then
            # status event: prefer the PR that apply stamped into the status
            # description (pr=#N), verified open — this keeps the gate alive when
            # one SHA backs several open PRs. Fall back to mapping the commit to
            # its single open PR, else fail closed.
            DESC_PR="$(printf '%s' "$EVENT_DESC" | sed -nE 's/.*pr=#([0-9]+):.*/\1/p')"
            if [ -n "$DESC_PR" ]; then
              STATE="$(gh api "repos/$REPO/pulls/$DESC_PR" --jq '.state' 2>/dev/null || true)"
              [ "$STATE" = "open" ] && PR="$DESC_PR"
            fi
            if [ -z "$PR" ]; then
              PRS="$(gh api "repos/$REPO/commits/$EVENT_SHA/pulls" \
                      --jq '.[] | select(.state=="open") | .number' 2>/dev/null || true)"
              COUNT="$(printf '%s\n' "$PRS" | grep -c . || true)"
              if [ "${COUNT:-0}" -ne 1 ]; then
                echo "status maps to ${COUNT:-0} open PR(s); need exactly one. Not gating."
                echo "found=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
              PR="$PRS"
            fi
          fi
          if [ -z "$PR" ]; then echo "found=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          # PR is interpolated into API paths below; only a plain number is one.
          printf '%s' "$PR" | grep -qE '^[0-9]+$' || { echo "found=false" >> "$GITHUB_OUTPUT"; exit 0; }
          HEAD="$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid)"
          { echo "pr=$PR"; echo "head=$HEAD"; echo "found=true"; } >> "$GITHUB_OUTPUT"

      - name: Evaluate gate
        id: gate
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pr }}
          HEAD: ${{ steps.pr.outputs.head }}
        run: |
          set -euo pipefail
          # The status must be bound to THIS PR, not just this SHA: one head SHA
          # can back multiple open PRs (same branch, two bases), and PR A's clean
          # must never approve PR B. apply stamps the PR number into the status
          # description; require it here. Read the FULL status history (plural
          # endpoint), not the combined status: the combined payload keeps only
          # the newest status per context, so with a shared context another PR's
          # later stamp on the same SHA would hide this PR's verdict entirely.
          # Newest stamp for THIS PR wins, ordered by the numeric status id —
          # created_at has only second precision, so a same-second
          # success/failure pair would tie and sort by state instead.
          CLEAN="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
                    --jq ".[] | select(.context==\"agentic-review/clean\" and ((.description // \"\") | contains(\"pr=#$PR:\"))) | [(.id|tostring), .state] | @tsv" \
                    2>/dev/null | sort -n | tail -1 | cut -f2 || true)"
          NEEDS_HUMAN="$(gh pr view "$PR" --repo "$REPO" --json labels \
                          --jq 'any(.labels[].name; . == "needs-human")')"
          # The escalation condition. A verdict for THIS head decides when one
          # exists: label absence is not a completed "no", because the apply run
          # that sets the label may not have fired yet when the clean status
          # lands. A per-head "yes" verdict withholds until an AUTHORIZED human
          # removes the needs-human label AFTER that verdict. Heads pushed while
          # the label was set have NO verdict (escalation skips labeled PRs —
          # the sticky label cannot be added twice) and carry the skip marker
          # status escalation records when it skips; for those, an authorized
          # unlabel newer than the head's round marker (the NEWEST pending
          # conductor stamp for this head+PR, which on a reoccurring SHA
          # belongs to the current occurrence) is the sanctioned override — it
          # vouches only for code that existed when the human looked, and the
          # next push resumes escalation. The marker is what distinguishes a
          # skipped head from one whose verdict is merely still in flight: an
          # empty verdict lookup also happens while the judge is running, and
          # an unlabel must never approve ahead of an inbound "yes".
          # The verdict carries a `head:` marker (see /agentic-comment-format),
          # so a stale verdict from an earlier push never vouches for newer
          # commits. Exactly one valid yes/no marker, or the verdict is
          # malformed and withholds.
          #
          # Who may unlabel: GitHub has no per-label permissions, so the gate is
          # the enforcement point. Only unlabels by the allowlisted logins
          # (NEEDS_HUMAN_UNLABELERS, defined once at the job level so this step
          # and the pre-approval recheck can never drift) count; an unauthorized
          # removal leaves the label gone but the gate withheld, and escalation
          # re-labels on the next push. The allowlist lives in this
          # default-branch workflow file, so changing it takes a reviewed PR
          # through this very pipeline.
          # The MOST RECENT unlabel overall must be authorized — the last
          # removal is what produced the current label state, and an older
          # authorized unlabel must never vouch for a state an unauthorized
          # hand created later. Unauthorized (or unattributed) newest event →
          # no authorized unlabel at all. Ordered by the numeric timeline
          # event id: created_at has second precision, and a same-second tie
          # must never fall through to the actor login.
          # The timeline read must COMPLETE before any event is trusted:
          # --paginate streams page by page, so a later-page failure leaves a
          # partial list whose maximum can be an older authorized event while
          # the true newest (possibly unauthorized) one is missing — fail
          # open. A failed read therefore leaves AUTH_UNLABEL empty, which
          # withholds every branch that needs an unlabel — and TL_OK false,
          # which withholds the "no"-verdict branch too: with no complete
          # timeline, "no unlabel ever happened" cannot be distinguished from
          # "the read failed", and only the former may stand on its own.
          AUTH_UNLABEL=""; LAST_TS=""; TL_OK=false
          if EVENTS="$(gh api "repos/$REPO/issues/$PR/timeline" --paginate \
            --jq '.[] | select(.event=="unlabeled" and .label.name=="needs-human") | [((.id // 0) | tostring), .created_at, (.actor.login // "")] | @tsv' \
            2>/dev/null)"; then
            TL_OK=true
            LAST_EVENT="$(printf '%s\n' "$EVENTS" | grep -v '^$' | sort -n | tail -1 || true)"
            if [ -n "$LAST_EVENT" ]; then
              LAST_TS="$(printf '%s' "$LAST_EVENT" | cut -f2)"
              LAST_ACTOR="$(printf '%s' "$LAST_EVENT" | cut -f3)"
              case " $NEEDS_HUMAN_UNLABELERS " in
                *" $LAST_ACTOR "*) [ -n "$LAST_ACTOR" ] && AUTH_UNLABEL="$LAST_TS" ;;
              esac
            fi
          fi
          # A base retarget keeps the head SHA but changes the reviewed diff,
          # so a same-head verdict from BEFORE the newest retarget vouches for
          # a diff that no longer exists. Verdicts must postdate the newest
          # base_ref_changed event; a failed timeline read withholds (fail
          # closed) by leaving RT_OK false.
          RT_OK=false; RETARGET_TS=""
          if RT_RAW="$(gh api "repos/$REPO/issues/$PR/timeline" --paginate \
            --jq '.[] | select(.event=="base_ref_changed") | .created_at' \
            2>/dev/null)"; then
            RT_OK=true
            RETARGET_TS="$(printf '%s\n' "$RT_RAW" | grep -v '^$' | sort | tail -1 || true)"
          fi
          # Lookup success is tracked separately from lookup emptiness: a failed
          # comments call must never be read as "no verdict exists" — that would
          # fail OPEN into the unlabel-fallback branch. Only a successful,
          # complete lookup that returns nothing takes that branch.
          V_OK=false; V=""
          if VRAW="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.user.login==\"lfx-reviewer\" and (.body | contains(\"<!-- agentic:needs-human v1 -->\")) and (.body | contains(\"<!-- head: $HEAD -->\"))) | [(.id|tostring), .created_at, (if ((.body | contains(\"<!-- needs-human: yes -->\")) and (.body | contains(\"<!-- needs-human: no -->\"))) then \"malformed\" elif (.body | contains(\"<!-- needs-human: yes -->\")) then \"yes\" elif (.body | contains(\"<!-- needs-human: no -->\")) then \"no\" else \"malformed\" end)] | @tsv" \
            2>/dev/null)"; then
            V_OK=true
            # Newest verdict by NUMERIC comment id — created_at has only
            # second precision, so a same-second pair would tie and sort by
            # verdict value instead; the id is monotonic and unique.
            V="$(printf '%s\n' "$VRAW" | grep -v '^$' | sort -n | tail -1 | cut -f2- || true)"
          fi
          # A verdict older than the newest retarget is stale for the current
          # diff: discard it (the retarget-triggered escalation re-judges and
          # re-posts). Without a complete timeline read no verdict can be
          # trusted at all — a hidden retarget would validate a stale one.
          if [ "$RT_OK" != "true" ]; then
            V=""; V_OK=false
          elif [ -n "$V" ] && [ -n "$RETARGET_TS" ] && [ ! "${V%%	*}" \> "$RETARGET_TS" ]; then
            echo "discarding same-head verdict from before the base retarget ($RETARGET_TS)"
            V=""
          fi
          ESC_OK=false
          if [ -n "$V" ]; then
            V_TS="${V%%	*}"; V_VAL="${V##*	}"
            if [ "$V_VAL" = "no" ]; then
              # A "no" verdict does not stand on its own: the needs-human
              # label is also a MANUAL override surface (anyone with triage
              # can raise it), and the allowlist invariant — the most recent
              # unlabel overall must be authorized — applies to that flag no
              # matter what the per-head judge said, and regardless of
              # ordering: the judge adjudicates the DIFF, never label actors,
              # so a later "no" cannot vouch for an earlier unauthorized
              # removal of a manual hold (the hold's reason may not be in the
              # diff at all). Only "no unlabel ever" or "newest unlabel
              # authorized" stands; recovery from an unauthorized removal is
              # an allowlisted human re-adding and removing the label.
              # Requires a complete timeline read (TL_OK).
              if [ "$TL_OK" = "true" ]; then
                if [ -z "$LAST_TS" ] || [ -n "$AUTH_UNLABEL" ]; then
                  ESC_OK=true
                fi
              fi
            elif [ "$V_VAL" = "yes" ]; then
              if [ -n "$AUTH_UNLABEL" ] && [ "$AUTH_UNLABEL" \> "$V_TS" ]; then
                ESC_OK=true
              fi
            fi
          elif [ "$V_OK" = "true" ]; then
            # No verdict for this head (confirmed by a successful lookup):
            # legitimate only when the head arrived while the label was set —
            # which escalation PROVES by recording a skip marker status on the
            # head. No marker means the judge actually ran and its verdict is
            # still in flight (or was lost): withhold, and let the verdict
            # comment (or the next push) re-trigger this gate. A failed marker
            # lookup reads as "no marker" — the fail-closed direction.
            # The round reference is the NEWEST pending stamp for this head+PR
            # (max status id): the conductor stamps pending at every round
            # start, so on a SHA that re-occurs (force-push back, reopen) the
            # newest pending stamp belongs to the CURRENT occurrence — an
            # unlabel from a past occurrence of the same SHA never vouches.
            # The stamp lands seconds after the push; an unlabel inside that
            # tiny window is rejected (fail closed). What recovers it is a
            # FRESH authorized unlabel that lands after the stamp exists —
            # re-adding the label and removing it again mints one — or the
            # next push. (That is unlike the stale-marker case below, where
            # relabeling cannot help because the missing evidence is
            # escalation's, not the human's.)
            ROUND="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
              --jq ".[] | select(.state==\"pending\" and .context==\"agentic-review/clean\" and ((.description // \"\") | contains(\"pr=#$PR:\"))) | [(.id|tostring), .created_at] | @tsv" \
              2>/dev/null | sort -n | tail -1 || true)"
            ROUND_ID="$(printf '%s' "$ROUND" | cut -f1)"
            ROUND_TS="$(printf '%s' "$ROUND" | cut -f2)"
            # The skip marker must belong to THIS round, not to a past
            # occurrence of a reused SHA whose escalation may be running right
            # now: escalation records the marker only after the round's
            # pending stamp exists (its pre-skip wait), so a genuine skip's
            # marker id is always NEWER than the round stamp's. Compare
            # numeric status ids — both live on the same SHA's append-only
            # status list. A stale marker therefore fails closed here.
            # Deterministic recovery is a push of a NEW SHA (no old stamps to
            # race) or a manual escalation rerun after the current pending
            # stamp exists; a reopen is only a best-effort retry (escalation
            # re-runs, but on a reused SHA its pre-skip wait can be satisfied
            # by the old stamp again); a label toggle merely re-runs this
            # gate.
            SKIP_ID="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
              --jq ".[] | select(.context==\"agentic-review/escalation\" and .state==\"success\" and ((.description // \"\") | contains(\"skipped pr=#$PR:\"))) | .id" \
              2>/dev/null | sort -n | tail -1 || true)"
            if [ -n "$SKIP_ID" ] && [ -n "$ROUND_ID" ] && [ "$SKIP_ID" -gt "$ROUND_ID" ] && [ -n "$AUTH_UNLABEL" ] && [ "$AUTH_UNLABEL" \> "$ROUND_TS" ]; then
              ESC_OK=true
            fi
          fi
          # Tidiness: every review thread (AI or human) must carry at least one
          # reply beyond the finding itself, so nothing is dismissed without a
          # recorded reason. Resolution state is deliberately ignored — see the
          # header. A failed listing must NOT fail this step: the approve/dismiss
          # decision below has to be written to the outputs so the dismissal
          # backstop still runs — a listing error therefore degrades to "untidy"
          # (withhold + dismiss), which is the fail-closed direction for a PR
          # that already carries an approval.
          THREADS_OK=false
          NOREPLY="?"
          # shellcheck disable=SC2016  # $owner/$name/$pr/$endCursor are GraphQL variables, not shell expansions
          if THREADS="$(gh api graphql --paginate \
            -f query='query($owner:String!,$name:String!,$pr:Int!,$endCursor:String){
              repository(owner:$owner,name:$name){pullRequest(number:$pr){
                reviewThreads(first:100,after:$endCursor){
                  nodes{comments(first:1){totalCount}}
                  pageInfo{hasNextPage endCursor}}}}}' \
            -f owner="${REPO%/*}" -f name="${REPO#*/}" -F pr="$PR" \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[] | (.comments.totalCount|tostring)')"; then
            NOREPLY="$(printf '%s\n' "$THREADS" | awk '($1+0)<2 && NF' | grep -c . || true)"
            [ "${NOREPLY:-0}" -eq 0 ] && THREADS_OK=true
          else
            echo "::warning::review-thread listing failed; treating the PR as untidy so the verdict stays withheld and stale approvals are dismissed."
          fi
          echo "clean=$CLEAN needs-human=$NEEDS_HUMAN escalation=${V:-none} esc_ok=$ESC_OK threads-without-reply=$NOREPLY (head $HEAD)" >> "$GITHUB_STEP_SUMMARY"
          if [ "$ESC_OK" != "true" ]; then
            echo "Escalation not satisfied: no per-head 'no' verdict, and no authorized needs-human unlabel newer than the verdict (or, for a head escalation skipped — proven by its skip marker status — newer than the head's round start; a verdict-less head WITHOUT the marker means the judge is still in flight and always withholds)." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$THREADS_OK" != "true" ]; then
            echo "Review threads are not tidy: every thread needs at least one reply before the gate approves." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$CLEAN" = "success" ] && [ "$NEEDS_HUMAN" != "true" ] && [ "$ESC_OK" = "true" ] && [ "$THREADS_OK" = "true" ]; then
            echo "approve=true" >> "$GITHUB_OUTPUT"
          else
            echo "approve=false" >> "$GITHUB_OUTPUT"
            echo "Withholding approval." >> "$GITHUB_STEP_SUMMARY"
          fi

      # The write paths below authenticate as lfx-reviewer. Fetch its PAT from AWS
      # Secrets Manager via OIDC (argocd's lfx-one pattern) only when a verdict
      # must be posted or revoked. Fail soft: if the role trust or the secret is
      # not wired yet, the write steps skip instead of erroring.
      - name: Configure AWS credentials
        if: steps.pr.outputs.found == 'true'
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::788942260905:role/github-actions-deploy
          aws-region: us-east-2

      - name: Get lfx-reviewer token from AWS Secrets Manager
        if: steps.pr.outputs.found == 'true'
        continue-on-error: true
        uses: aws-actions/aws-secretsmanager-get-secrets@3a411b6ec5cace3d626412dd917e7bfeac242cfa # v3
        with:
          secret-ids: |
            GH, /cloudops/managed-secrets/cloud/github/linuxfoundation/lfx-reviewer-pat
          parse-json-secrets: true

      - name: Post approving review (lfx-reviewer)
        if: steps.gate.outputs.approve == 'true'
        env:
          # The Secrets Manager step exports the secret's PAT key as GH_PAT; gh
          # reads GH_TOKEN, so map it here. Empty when the fetch failed soft.
          GH_TOKEN: ${{ env.GH_PAT }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pr }}
          HEAD: ${{ steps.pr.outputs.head }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "lfx-reviewer PAT unavailable (OIDC role or secret not wired); not approving." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Approve as lfx-reviewer, but only if it has not already approved this exact
          # head, so repeated gate events for the same commit do not stack approvals.
          # Paginate and count matching lines (--paginate applies --jq per page, so
          # the `[...] | length` form would emit one count per page and break).
          already="$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate \
            --jq ".[] | select(.user.login==\"lfx-reviewer\" and .state==\"APPROVED\" and .commit_id==\"$HEAD\") | .id" \
            | grep -c . || true)"
          if [ "${already:-0}" -gt 0 ]; then
            echo "lfx-reviewer already approved $HEAD; no-op." >> "$GITHUB_STEP_SUMMARY"
          else
            # Re-validate ALL gate inputs at the last moment, not just the head:
            # status-event and label-event gate runs race on different concurrency
            # keys, so a regression run may have dismissed while this run was
            # queued behind its evaluation. Any change since evaluation aborts
            # (fail closed) — the signal that changed things re-derives on its own.
            esc_ok() {
              # Same rule as Evaluate gate: an explicit per-head "no" (which
              # stands only if the latest needs-human unlabel is absent or
              # authorized — the label is also a manual override surface and
              # the allowlist invariant applies regardless of the judge's
              # answer and regardless of event ordering; verdict recency
              # never launders an unauthorized removal); or a
              # "yes" with a later AUTHORIZED unlabel; or — for a head pushed
              # while the label was set, proven by escalation's per-head skip
              # marker status — an authorized unlabel newer than the head's
              # round start. A verdict-less head WITHOUT the marker means the
              # judge is still in flight and always withholds. Malformed
              # verdicts withhold. The allowlist is the job-level
              # NEEDS_HUMAN_UNLABELERS, shared with Evaluate gate, and — same
              # rule — the MOST RECENT unlabel overall must be the authorized
              # one, ordered by numeric timeline event id (created_at ties at
              # second precision and must never fall through to actor login).
              # Same completeness rule as Evaluate gate: a partial paginated
              # timeline must never authorize (its maximum can be an older
              # authorized event while the true newest is missing), and a
              # complete read is a precondition of EVERY branch here — the
              # "no" branch must distinguish "no unlabel ever" from "read
              # failed" — so a failed read withholds outright.
              AUTH_UNLABEL=""; LAST_TS=""
              EVENTS="$(gh api "repos/$REPO/issues/$PR/timeline" --paginate \
                --jq '.[] | select(.event=="unlabeled" and .label.name=="needs-human") | [((.id // 0) | tostring), .created_at, (.actor.login // "")] | @tsv' \
                2>/dev/null)" || return 1
              LAST_EVENT="$(printf '%s\n' "$EVENTS" | grep -v '^$' | sort -n | tail -1 || true)"
              if [ -n "$LAST_EVENT" ]; then
                LAST_TS="$(printf '%s' "$LAST_EVENT" | cut -f2)"
                LAST_ACTOR="$(printf '%s' "$LAST_EVENT" | cut -f3)"
                case " $NEEDS_HUMAN_UNLABELERS " in
                  *" $LAST_ACTOR "*) [ -n "$LAST_ACTOR" ] && AUTH_UNLABEL="$LAST_TS" ;;
                esac
              fi
              # A failed verdict lookup withholds outright — never read an API
              # error as "no verdict exists" (that would fail open into the
              # unlabel-fallback branch).
              VRAW="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                --jq ".[] | select(.user.login==\"lfx-reviewer\" and (.body | contains(\"<!-- agentic:needs-human v1 -->\")) and (.body | contains(\"<!-- head: $HEAD -->\"))) | [(.id|tostring), .created_at, (if ((.body | contains(\"<!-- needs-human: yes -->\")) and (.body | contains(\"<!-- needs-human: no -->\"))) then \"malformed\" elif (.body | contains(\"<!-- needs-human: yes -->\")) then \"yes\" elif (.body | contains(\"<!-- needs-human: no -->\")) then \"no\" else \"malformed\" end)] | @tsv" \
                2>/dev/null)" || return 1
              # Newest by numeric comment id (see Evaluate gate); a verdict
              # from before the newest base retarget is stale for the current
              # diff (same rule as Evaluate gate), and a failed timeline read
              # withholds.
              RT_RAW="$(gh api "repos/$REPO/issues/$PR/timeline" --paginate \
                --jq '.[] | select(.event=="base_ref_changed") | .created_at' \
                2>/dev/null)" || return 1
              RETARGET_TS="$(printf '%s\n' "$RT_RAW" | grep -v '^$' | sort | tail -1 || true)"
              V="$(printf '%s\n' "$VRAW" | grep -v '^$' | sort -n | tail -1 | cut -f2- || true)"
              if [ -n "$V" ] && [ -n "$RETARGET_TS" ] && [ ! "${V%%	*}" \> "$RETARGET_TS" ]; then
                V=""
              fi
              if [ -z "$V" ]; then
                # No verdict: only a head escalation SKIPPED — proven by its
                # skip marker status — may take the unlabel fallback; an empty
                # lookup also happens while the judge's verdict is in flight,
                # and a failed marker lookup reads as "no marker" (fail
                # closed). Newest pending stamp = current occurrence's round
                # start, and the marker must be NEWER than it by numeric
                # status id so a stale marker from a past occurrence of a
                # reused SHA never vouches; same reasoning as Evaluate gate.
                ROUND="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
                  --jq ".[] | select(.state==\"pending\" and .context==\"agentic-review/clean\" and ((.description // \"\") | contains(\"pr=#$PR:\"))) | [(.id|tostring), .created_at] | @tsv" \
                  2>/dev/null | sort -n | tail -1 || true)"
                ROUND_ID="$(printf '%s' "$ROUND" | cut -f1)"
                ROUND_TS="$(printf '%s' "$ROUND" | cut -f2)"
                SKIP_ID="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
                  --jq ".[] | select(.context==\"agentic-review/escalation\" and .state==\"success\" and ((.description // \"\") | contains(\"skipped pr=#$PR:\"))) | .id" \
                  2>/dev/null | sort -n | tail -1 || true)"
                [ -n "$SKIP_ID" ] && [ -n "$ROUND_ID" ] && [ "$SKIP_ID" -gt "$ROUND_ID" ] && [ -n "$AUTH_UNLABEL" ] && [ "$AUTH_UNLABEL" \> "$ROUND_TS" ]
                return
              fi
              if [ "${V##*	}" = "no" ]; then
                # The "no" stands only over an unlabel history it can vouch
                # for: latest unlabel absent or authorized (same rule as
                # Evaluate gate; verdict recency never launders an
                # unauthorized removal).
                [ -z "$LAST_TS" ] || [ -n "$AUTH_UNLABEL" ]
                return
              fi
              [ "${V##*	}" = "yes" ] || return 1
              [ -n "$AUTH_UNLABEL" ] && [ "$AUTH_UNLABEL" \> "${V%%	*}" ]
            }
            threads_ok() {
              # Same rule as Evaluate gate: every thread has at least one reply
              # (resolution ignored). A failed listing withholds (fail closed).
              # shellcheck disable=SC2016  # $owner/$name/$pr/$endCursor are GraphQL variables, not shell expansions
              T="$(gh api graphql --paginate \
                -f query='query($owner:String!,$name:String!,$pr:Int!,$endCursor:String){
                  repository(owner:$owner,name:$name){pullRequest(number:$pr){
                    reviewThreads(first:100,after:$endCursor){
                      nodes{comments(first:1){totalCount}}
                      pageInfo{hasNextPage endCursor}}}}}' \
                -f owner="${REPO%/*}" -f name="${REPO#*/}" -F pr="$PR" \
                --jq '.data.repository.pullRequest.reviewThreads.nodes[] | (.comments.totalCount|tostring)')" || return 1
              BAD="$(printf '%s\n' "$T" | awk '($1+0)<2 && NF' | grep -c . || true)"
              [ "${BAD:-0}" -eq 0 ]
            }
            recheck() {
              NOW_HEAD="$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid)"
              # Full status history, newest stamp for THIS PR by numeric status
              # id — see Evaluate gate.
              NOW_CLEAN="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
                --jq ".[] | select(.context==\"agentic-review/clean\" and ((.description // \"\") | contains(\"pr=#$PR:\"))) | [(.id|tostring), .state] | @tsv" \
                2>/dev/null | sort -n | tail -1 | cut -f2 || true)"
              NOW_LABEL="$(gh pr view "$PR" --repo "$REPO" --json labels \
                --jq 'any(.labels[].name; . == "needs-human")')"
              [ "$NOW_HEAD" = "$HEAD" ] && [ "$NOW_CLEAN" = "success" ] && [ "$NOW_LABEL" != "true" ] && esc_ok && threads_ok
            }
            if ! recheck; then
              echo "Gate inputs changed since evaluation (head=$NOW_HEAD clean=$NOW_CLEAN needs-human=$NOW_LABEL); not approving." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            RID="$(gh api --method POST "repos/$REPO/pulls/$PR/reviews" \
              -f commit_id="$HEAD" -f event=APPROVE \
              -f body="Agentic gate: no blocking AI-review findings remain, every review thread has a reply, and no needs-human label is set. Approving on behalf of the automated review; a human review is still expected." \
              --jq '.id')"
            echo "Gate: APPROVED PR #$PR as lfx-reviewer (head $HEAD, review $RID)." >> "$GITHUB_STEP_SUMMARY"
            # Compensating check: if an input regressed in the instant between the
            # re-check and the POST, revoke our own approval right here instead of
            # waiting for the next signal. Together with branch protection's
            # "dismiss stale approvals on push" this closes the approve-time race.
            if ! recheck; then
              gh api --method PUT "repos/$REPO/pulls/$PR/reviews/$RID/dismissals" \
                -f message="Agentic gate: inputs changed while approving; revoking the automated approval." \
                -f event=DISMISS >/dev/null
              echo "Gate: inputs regressed during approval; self-dismissed review $RID." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Dismiss stale approval (withheld verdict)
        if: steps.gate.outputs.approve == 'false' && steps.pr.outputs.found == 'true'
        env:
          # The Secrets Manager step exports the secret's PAT key as GH_PAT; gh
          # reads GH_TOKEN, so map it here. Empty when the fetch failed soft.
          GH_TOKEN: ${{ env.GH_PAT }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.pr }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "lfx-reviewer PAT unavailable (OIDC role or secret not wired); nothing dismissed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # If lfx-reviewer approved earlier but the PR has since regressed (a blocking
          # finding reappeared, needs-human was set, or a new commit is not yet clean),
          # revoke that approval so the gate never leaves stale sign-off on the PR.
          # This step is the safety backstop, so it fails LOUDLY: a failed listing or
          # a failed dismissal fails the job (bash -e), never a silent green.
          ids="$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate \
            --jq '.[] | select(.user.login=="lfx-reviewer" and .state=="APPROVED") | .id')"
          if [ -z "$ids" ]; then
            echo "Gate: WITHHOLD (no prior lfx-reviewer approval to dismiss)." >> "$GITHUB_STEP_SUMMARY"
          else
            for id in $ids; do
              gh api --method PUT "repos/$REPO/pulls/$PR/reviews/$id/dismissals" \
                -f message="Agentic gate: PR is no longer clean, has review threads without a reply, or now needs a human; dismissing the automated approval." \
                -f event=DISMISS >/dev/null
              echo "dismissed review $id" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

  # Thread replies change tidiness without any of our trigger events firing, so
  # this job is the gate's liveness backstop: on a timer it dispatches the gate
  # job above once per open
  # PR that the pipeline has already stamped. workflow_dispatch is one of the two
  # event types GITHUB_TOKEN is permitted to trigger (the documented exception to
  # the no-recursive-workflows rule), so this needs no PAT and — unlike
  # re-stamping statuses — appends nothing to the commit (the Create Commit
  # Status API caps at 1,000 statuses per SHA/context, which a 10-minute
  # re-stamp loop would exhaust within days on a long-lived head). A PR that
  # never had a conductor status is left alone, so a sweep can never move a
  # gate the pipeline has not touched.
  sweep:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: read
      actions: write   # gh workflow run (self-dispatch per PR)
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Dispatch per-PR gate evaluation
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for PR in $(gh api "repos/$REPO/pulls?state=open&per_page=100" --paginate --jq '.[].number'); do
            HEAD="$(gh api "repos/$REPO/pulls/$PR" --jq '.head.sha')"
            # Only PRs the conductor has stamped for their current head: the
            # gate has no verdict to reach before that, and drafts or foreign
            # PRs stay untouched. Existence check only — the gate re-derives
            # the actual state itself.
            HAS="$(gh api "repos/$REPO/commits/$HEAD/statuses" --paginate \
                    --jq ".[] | select(.context==\"agentic-review/clean\" and ((.description // \"\") | contains(\"pr=#$PR:\"))) | .id" \
                    2>/dev/null | head -1 || true)"
            [ -n "$HAS" ] || continue
            # One failed dispatch must not starve the rest of the loop. --repo is
            # required: this job never checks out the repository, so gh has no
            # git remote to infer it from.
            if gh workflow run agentic-gate.yml --repo "$REPO" --ref "${GITHUB_REF_NAME}" -f pr="$PR" 2>/dev/null; then
              echo "dispatched gate for pr=#$PR" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::could not dispatch gate for PR #$PR"
            fi
          done
