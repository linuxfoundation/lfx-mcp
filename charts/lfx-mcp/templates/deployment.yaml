---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lfx-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lfx-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lfx-mcp.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: LFXMCP_MODE
              value: http
            - name: LFXMCP_HTTP_HOST
              value: "0.0.0.0"
            - name: LFXMCP_HTTP_PORT
              value: {{ .Values.service.port | quote }}
            - name: LFXMCP_MCP_API_PUBLIC_URL
              value: {{ include "lfx-mcp.mcpPublicURL" . | quote }}
            - name: LFXMCP_MCP_API_AUTH_SERVERS
              value: {{ .Values.app.mcpApiAuthServers | quote }}
            {{- if .Values.app.debug }}
            - name: LFXMCP_DEBUG
              value: "true"
            {{- end }}
            {{- if .Values.app.debugTraffic }}
            - name: LFXMCP_DEBUG_TRAFFIC
              value: "true"
            {{- end }}
            {{- if .Values.app.mcpApiScopes }}
            - name: LFXMCP_MCP_API_SCOPES
              value: {{ .Values.app.mcpApiScopes | quote }}
            {{- end }}
            {{- if .Values.app.tools }}
            - name: LFXMCP_TOOLS
              value: {{ .Values.app.tools | quote }}
            {{- end }}
            - name: LFXMCP_TOKEN_ENDPOINT
              value: {{ .Values.app.tokenEndpoint | quote }}
            - name: LFXMCP_LFX_API_URL
              value: {{ .Values.app.lfxAPIURL | quote }}
            - name: LFXMCP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.clientID }}
            - name: LFXMCP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.clientSecret }}
                  optional: true
            - name: LFXMCP_CLIENT_ASSERTION_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.clientAssertionSigningKey }}
                  optional: true
            {{- /*
              TEMPORARY: Expose each API key credential as an individual env var
              LFXMCP_API_CREDENTIALS_<KEY>=<secret> sourced from the Secret referenced by
              apiCredentials.secretName. Remove this block when static API key support is retired.
            */}}
            {{- if and .Values.apiCredentials .Values.apiCredentials.secretName .Values.apiCredentials.keys }}
            {{- range $consumerKey, $secretKey := .Values.apiCredentials.keys }}
            - name: {{ printf "LFXMCP_API_CREDENTIALS_%s" ($consumerKey | upper) }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.apiCredentials.secretName }}
                  key: {{ $secretKey }}
            {{- end }}
            {{- end }}
            {{- with .Values.app.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.app.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.app.otel.endpoint | quote }}
            {{- end }}
            {{- if .Values.app.otel.tracesExporter }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.app.otel.tracesExporter | quote }}
            {{- end }}
            {{- if .Values.app.otel.tracesSampler }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.app.otel.tracesSampler | quote }}
            {{- end }}
            {{- if .Values.app.otel.tracesSamplerArg }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.app.otel.tracesSamplerArg | quote }}
            {{- end }}
          ports:
            - name: web
              containerPort: {{ .Values.service.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /livez
              port: web
            failureThreshold: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: web
            failureThreshold: 1
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /readyz
              port: web
            failureThreshold: 30
            periodSeconds: 1
