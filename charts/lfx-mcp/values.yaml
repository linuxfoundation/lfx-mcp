---
# image is the configuration for the container image.
image:
  # repository is the container image repository.
  repository: ghcr.io/linuxfoundation/lfx-mcp/lfx-mcp-server
  # tag is the container image tag (overrides appVersion from Chart.yaml).
  tag: ""
  # pullPolicy is the image pull policy.
  pullPolicy: IfNotPresent

# replicaCount is the number of replicas for the deployment.
replicaCount: 1

# resources is the configuration for container resource limits and requests.
resources:
  # limits is the maximum amount of resources the container can use.
  limits:
    cpu: 500m
    memory: 256Mi
  # requests is the amount of resources the container requests.
  requests:
    cpu: 50m
    memory: 64Mi

# service is the configuration for the Kubernetes service.
service:
  # port is the service port.
  port: 8080

# ingress is the configuration for the Kubernetes Ingress resource.
ingress:
  # hostname is the public DNS hostname (the vanity domain, e.g. mcp.lfx.dev).
  hostname: ""
  # clusterHostname is the hostname within the cluster's managed DNS zone that
  # external-dns will create an A record for. Leave blank when hostname is already
  # within the managed zone (external-dns will manage it directly). Set this when
  # hostname is a vanity domain outside the managed zone — external-dns will create
  # an A record here, and the vanity hostname should CNAME to this.
  # Example: lfx-mcp.prod.v2.cluster.linuxfound.info
  clusterHostname: ""
  # certIssuer is the cert-manager ClusterIssuer used for TLS certificate provisioning.
  certIssuer: letsencrypt-prod
  # tlsSecretName is the name of the TLS Secret that cert-manager will create.
  tlsSecretName: lfx-mcp-tls
  # annotations are additional annotations to merge into the Ingress resource.
  annotations: {}

# podAnnotations are additional annotations to merge into the pod template metadata.
# Example use: Datadog log collection configuration.
#   podAnnotations:
#     ad.datadoghq.com/app.logs: '[{"service": "lfx-mcp", "source": "go"}]'
podAnnotations: {}

# app is the configuration for the application.
app:
  # debug enables debug logging.
  debug: false
  # debugTraffic enables HTTP request/response wire logging for outbound LFX API calls.
  debugTraffic: false
  # mcpApiAuthServers is the space-separated list of OAuth2 authorization server URLs.
  mcpApiAuthServers: ""
  # mcpApiScopes is the comma-separated list of OAuth2 scopes to advertise via OAuth PRM (empty advertises no scopes).
  mcpApiScopes: ""
  # tools is the comma-separated list of tools to enable (empty uses the server default tool set).
  tools: ""
  # lfxAPIURL is the base URL of the LFX API.
  lfxAPIURL: ""
  # tokenEndpoint is the OAuth2 token endpoint URL used for client credentials.
  tokenEndpoint: ""
  # otel contains OpenTelemetry exporter configuration.
  # All values default to empty (no-op tracer) so the chart is deployment-environment agnostic.
  # The ArgoCD values files supply the environment-specific endpoint and sample ratio.
  otel:
    # endpoint is the OTLP gRPC collector endpoint (e.g. "http://$(HOST_IP):4317").
    # Leave empty to disable tracing (installs a no-op provider).
    # Bare host:port values are assumed to be plain HTTP; supply an explicit https:// scheme for TLS.
    endpoint: ""
    # tracesExporter selects the traces exporter ("otlp" or "none").
    tracesExporter: ""
    # tracesSampleRatio is the trace sampling ratio (0.0–1.0, e.g. "0.2" for 20%).
    tracesSampleRatio: ""
  # extraEnv is a list of additional environment variables to inject into the container.
  # Used to supply HOST_IP (from the pod's status.hostIP) and the derived OTEL endpoint.
  # Example (set in ArgoCD values, not here):
  #   extraEnv:
  #     - name: HOST_IP
  #       valueFrom:
  #         fieldRef:
  #           fieldPath: status.hostIP
  extraEnv: []

# secrets contains the name of the pre-existing Kubernetes Secret created by the external
# secrets operator, along with the keys under which each credential is stored.
secrets:
  # name is the name of the Kubernetes Secret.
  name: lfx-mcp-secrets
  # keys maps each credential to the key name used in the Secret.
  keys:
    # clientID is the key name for the OAuth2 client ID.
    clientID: client_id
    # clientSecret is the key name for the OAuth2 client secret (used when authenticating
    # with a shared secret rather than a signed client assertion).
    clientSecret: client_secret
    # clientAssertionSigningKey is the key name for the private key used to sign client
    # assertions (used when authenticating with a JWT client assertion instead of a
    # client secret).
    clientAssertionSigningKey: client_assertion_signing_key
# apiCredentials is a TEMPORARY stop-gap for MCP clients that cannot complete a full
# OAuth2 authorization code flow. Remove this stanza once all clients support proper
# OAuth2.
#
# NOTE: app.mcpApiAuthServers must also be set for API-key authentication to take
# effect. apiCredentials is a fallback within the OAuth2 bearer-token middleware —
# it is not an independent auth mechanism.
#
# When set, the Deployment will expose each consumer-key→secret pair as an individual
# env var (LFXMCP_API_CREDENTIALS_<KEY>=<secret>) sourced from the referenced Secret.
# Clients authenticate by passing the shared secret as "Authorization: Bearer <secret>".
# Authenticated requests are granted the same scopes as an OAuth2 M2M
# client_credentials token (read:all, manage:all).
#
# This stanza has NO default values and is entirely opt-in. Example:
#
#   apiCredentials:
#     secretName: lfx-mcp-api-keys
#     keys:
#       my-client: my_client_api_key
#
# The Secret referenced by secretName must already exist before the chart is deployed.
# Its data keys must match the values listed under apiCredentials.keys.
#
# apiCredentials:
#   # secretName is the name of the pre-existing Kubernetes Secret holding the API key pairs.
#   secretName: ""
#   # keys maps API consumer identifiers (used as TokenInfo.UserID) to key names in the
#   # Secret whose values are the corresponding shared-secret passwords.
#   keys: {}
#   #   my-client: my_client_api_key
